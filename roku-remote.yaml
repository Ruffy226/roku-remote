# ESP32-S3 Gen 1 - Roku Remote with 2.8" TFT
# Hardware: ESP32-S3 WROOM + 2.8" TFT LCD (240x320 ILI9341) + XPT2046 touchscreen
# Repo: /home/user/.openclaw/workspace/roku-remote
# 
# Control mapping:
# - D-pad, Select, Home, Back, Play, Apps → Roku Stick (192.168.4.179)
# - Power, Volume → TV (192.168.4.253)

substitutions:
  name: esp32-s3-gen-1
  friendly_name: "ESP32_S3_Gen_1"
  tv_ip: "192.168.4.253"
  stick_ip: "192.168.4.179"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: "sD3FofghRGtbKT63pfk5KFA6O8Wm2awvpFMTNgtB2d4="

ota:
  - platform: esphome
    password: "92b344e4d2a1c4a50e3ea954dcf96e74"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.4.80
    gateway: 192.168.4.1
    subnet: 255.255.252.0
    dns1: 192.168.4.222

spi:
  - id: display_spi
    clk_pin: GPIO18
    mosi_pin: GPIO7
    miso_pin: GPIO8

display:
  - platform: ili9xxx
    id: main_display
    spi_id: display_spi
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: GPIO2
    rotation: 0
    model: ILI9341
    invert_colors: false
    data_rate: 20MHz
    auto_clear_enabled: false
    
    lambda: |-
      it.fill(Color::BLACK);

      it.filled_rectangle(0, 0, 240, 28, Color(0x1E, 0x90, 0xFF));
      it.printf(120, 14, id(font_medium), Color::WHITE, TextAlign::CENTER, "Roku Remote");

      const int cx = 120;
      const int cy = 115;
      const int BTN = 65;
      const int GAP = 4;

      it.rectangle(cx - BTN/2, cy - BTN - GAP, BTN, BTN, Color::WHITE);
      it.printf(cx, cy - BTN/2 - GAP, id(font_large), Color::WHITE, TextAlign::CENTER, "^");

      it.rectangle(cx - BTN/2, cy + GAP, BTN, BTN, Color::WHITE);
      it.printf(cx, cy + BTN/2 + GAP, id(font_large), Color::WHITE, TextAlign::CENTER, "v");

      it.rectangle(cx - BTN - GAP, cy - BTN/2, BTN, BTN, Color::WHITE);
      it.printf(cx - BTN/2 - GAP, cy, id(font_large), Color::WHITE, TextAlign::CENTER, "<");

      it.rectangle(cx + GAP, cy - BTN/2, BTN, BTN, Color::WHITE);
      it.printf(cx + BTN/2 + GAP, cy, id(font_large), Color::WHITE, TextAlign::CENTER, ">");

      it.filled_circle(cx, cy + 25, 24, Color::WHITE);

      it.filled_rectangle(5, 178, 70, 28, Color(0x4C, 0xAF, 0x50));
      it.rectangle(5, 178, 70, 28, Color::WHITE);
      it.printf(40, 192, id(font_small), Color::WHITE, TextAlign::CENTER, "VOL+");

      it.filled_rectangle(165, 178, 70, 28, Color(0xF4, 0x43, 0x36));
      it.rectangle(165, 178, 70, 28, Color::WHITE);
      it.printf(200, 192, id(font_small), Color::WHITE, TextAlign::CENTER, "PWR");

      it.filled_rectangle(5, 212, 70, 28, Color(0x4C, 0xAF, 0x50));
      it.rectangle(5, 212, 70, 28, Color::WHITE);
      it.printf(40, 226, id(font_small), Color::WHITE, TextAlign::CENTER, "VOL-");

      it.filled_rectangle(165, 212, 70, 28, Color(0x60, 0x7D, 0x8B));
      it.rectangle(165, 212, 70, 28, Color::WHITE);
      it.printf(200, 226, id(font_small), Color::WHITE, TextAlign::CENTER, "HOME");

      it.filled_rectangle(4, 248, 44, 32, Color(0xE5, 0x00, 0x14));
      it.rectangle(4, 248, 44, 32, Color::WHITE);
      it.printf(26, 264, id(font_tiny), Color::WHITE, TextAlign::CENTER, "NET");

      it.filled_rectangle(52, 248, 44, 32, Color(0xFF, 0x00, 0x00));
      it.rectangle(52, 248, 44, 32, Color::WHITE);
      it.printf(74, 264, id(font_tiny), Color::WHITE, TextAlign::CENTER, "YT");

      it.filled_rectangle(100, 248, 44, 32, Color(0xCC, 0x00, 0x00));
      it.rectangle(100, 248, 44, 32, Color::WHITE);
      it.printf(122, 264, id(font_tiny), Color::WHITE, TextAlign::CENTER, "YTTV");

      it.filled_rectangle(148, 248, 44, 32, Color(0x1C, 0xE7, 0x8D));
      it.rectangle(148, 248, 44, 32, Color::WHITE);
      it.printf(170, 264, id(font_tiny), Color::WHITE, TextAlign::CENTER, "HULU");

      it.filled_rectangle(196, 248, 40, 32, Color(0x11, 0x3C, 0xCF));
      it.rectangle(196, 248, 40, 32, Color::WHITE);
      it.printf(216, 264, id(font_tiny), Color::WHITE, TextAlign::CENTER, "D+");

      it.rectangle(4, 286, 76, 30, Color::WHITE);
      it.printf(42, 301, id(font_small), Color::WHITE, TextAlign::CENTER, "BACK");

      it.rectangle(84, 286, 72, 30, Color::WHITE);
      it.printf(120, 301, id(font_small), Color::WHITE, TextAlign::CENTER, "PLAY");

      it.rectangle(160, 286, 76, 30, Color::WHITE);
      it.printf(198, 301, id(font_small), Color::WHITE, TextAlign::CENTER, "MENU");

touchscreen:
  - platform: xpt2046
    spi_id: display_spi
    cs_pin: GPIO21
    interrupt_pin: GPIO6
    calibration:
      x_min: 350
      x_max: 3700
      y_min: 280
      y_max: 3750
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false
    on_touch:
      - lambda: |-
          int x = touch.x;
          int y = touch.y;
          ESP_LOGI("touch", "x=%d y=%d", x, y);

          if (x >= 87 && x <= 153 && y >= 46 && y <= 111) {
            id(roku_up).press();
          }
          else if (x >= 87 && x <= 153 && y >= 119 && y <= 184) {
            id(roku_down).press();
          }
          else if (x >= 51 && x <= 116 && y >= 82 && y <= 148) {
            id(roku_left).press();
          }
          else if (x >= 124 && x <= 189 && y >= 82 && y <= 148) {
            id(roku_right).press();
          }
          else if (x >= 96 && x <= 144 && y >= 116 && y <= 164) {
            id(roku_select).press();
          }
          else if (x >= 5 && x <= 75 && y >= 178 && y <= 208) {
            id(tv_vol_up).press();
          }
          else if (x >= 165 && x <= 235 && y >= 178 && y <= 208) {
            id(tv_power).press();
          }
          else if (x >= 5 && x <= 75 && y >= 212 && y <= 240) {
            id(tv_vol_down).press();
          }
          else if (x >= 165 && x <= 235 && y >= 212 && y <= 240) {
            id(roku_home).press();
          }
          else if (x >= 4 && x <= 48 && y >= 248 && y <= 280) {
            id(launch_netflix).press();
          }
          else if (x >= 52 && x <= 96 && y >= 248 && y <= 280) {
            id(launch_youtube).press();
          }
          else if (x >= 100 && x <= 144 && y >= 248 && y <= 280) {
            id(launch_yttv).press();
          }
          else if (x >= 148 && x <= 192 && y >= 248 && y <= 280) {
            id(launch_hulu).press();
          }
          else if (x >= 196 && x <= 236 && y >= 248 && y <= 280) {
            id(launch_disney).press();
          }
          else if (x >= 4 && x <= 80 && y >= 286 && y <= 318) {
            id(roku_back).press();
          }
          else if (x >= 84 && x <= 156 && y >= 286 && y <= 318) {
            id(roku_play).press();
          }
          else if (x >= 160 && x <= 236 && y >= 286 && y <= 318) {
            id(roku_menu).press();
          }

font:
  - id: font_tiny
    file: "gfonts://Roboto"
    size: 10
  - id: font_small
    file: "gfonts://Roboto"
    size: 12
  - id: font_medium
    file: "gfonts://Roboto"
    size: 16
  - id: font_large
    file: "gfonts://Roboto"
    size: 24

http_request:
  useragent: "ESPHome/RokuRemote"
  timeout: 5s

button:
  - id: roku_up
    platform: template
    name: "Roku Up"
    on_press:
      - http_request.post:
          url: "http://${stick_ip}:8060/keypress/Up";

