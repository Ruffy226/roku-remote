# ESPHome Roku Remote - Dual Device
# Hardware: ESP32-S3 N16R8 Development Board
# Display: 2.4" TFT LCD Shield with ST7789V driver (240x320) + XPT2046 touchscreen
# Controls: TCL Roku TV + Roku Streaming Stick

substitutions:
  name: roku-remote
  friendly_name: "Roku Remote"
  tv_ip: "192.168.4.253"      # Living Room TV (TCL)
  stick_ip: "192.168.4.179"   # Living Room Stick

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  flash_size: 16MB

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

spi:
  - id: display_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19

# Global for device selection (false = TV, true = Stick)
globals:
  - id: use_stick
    type: bool
    restore_value: false
    initial_value: "false"

# ST7789V 2.4" Display (240x320)
display:
  - platform: st7789v
    id: main_display
    spi_id: display_spi
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: GPIO22
    rotation: 0
    dimensions:
      width: 240
      height: 320
    color_depth: 16
    data_rate: 40MHz
    auto_clear_enabled: false
    
    lambda: |-
      // Header with device indicator
      auto header_color = id(use_stick) ? Color(0x9C, 0x27, 0xB0) : Color(0x1E, 0x90, 0xFF);
      it.filled_rectangle(0, 0, 240, 35, header_color);
      it.printf(120, 18, id(font_medium), TextAlign::CENTER, Color::WHITE, "Roku Remote");
      
      // Device toggle indicator
      it.printf(120, 50, id(font_small), TextAlign::CENTER, Color::WHITE, 
                id(use_stick) ? "Stick" : "TV");
      
      // Navigation D-pad
      int btn_size = 55;
      int cx = 120;
      int cy = 130;
      
      // Up
      it.rectangle(cx - btn_size/2, cy - btn_size - 5, btn_size, btn_size, Color::WHITE);
      it.printf(cx, cy - btn_size/2 - 5, id(font_large), TextAlign::CENTER, Color::WHITE, "^");
      
      // Down
      it.rectangle(cx - btn_size/2, cy + 5, btn_size, btn_size, Color::WHITE);
      it.printf(cx, cy + btn_size/2 + 5, id(font_large), TextAlign::CENTER, Color::WHITE, "v");
      
      // Left
      it.rectangle(cx - btn_size - 5, cy - btn_size/2, btn_size, btn_size, Color::WHITE);
      it.printf(cx - btn_size/2 - 5, cy, id(font_large), TextAlign::CENTER, Color::WHITE, "<");
      
      // Right
      it.rectangle(cx + 5, cy - btn_size/2, btn_size, btn_size, Color::WHITE);
      it.printf(cx + btn_size/2 + 5, cy, id(font_large), TextAlign::CENTER, Color::WHITE, ">");
      
      // Select (center)
      it.filled_circle(cx, cy, 20, Color::WHITE);
      
      // Volume buttons (left side, always TV)
      it.filled_rectangle(10, 210, 50, 40, Color(0x4C, 0xAF, 0x50));
      it.rectangle(10, 210, 50, 40, Color::WHITE);
      it.printf(35, 230, id(font_medium), TextAlign::CENTER, Color::WHITE, "VOL+");
      
      it.filled_rectangle(10, 260, 50, 40, Color(0x4C, 0xAF, 0x50));
      it.rectangle(10, 260, 50, 40, Color::WHITE);
      it.printf(35, 280, id(font_medium), TextAlign::CENTER, Color::WHITE, "VOL-");
      
      // Device toggle button
      it.filled_rectangle(70, 220, 100, 35, id(use_stick) ? Color(0x9C, 0x27, 0xB0) : Color(0x1E, 0x90, 0xFF));
      it.rectangle(70, 220, 100, 35, Color::WHITE);
      it.printf(120, 238, id(font_small), TextAlign::CENTER, Color::WHITE, id(use_stick) ? "SWITCH TO TV" : "SWITCH TO STICK");
      
      // Right side buttons
      it.filled_rectangle(180, 210, 50, 40, Color(0xF4, 0x43, 0x36));
      it.rectangle(180, 210, 50, 40, Color::WHITE);
      it.printf(205, 230, id(font_medium), TextAlign::CENTER, Color::WHITE, "PWR");
      
      it.filled_rectangle(180, 260, 50, 40, Color(0x21, 0x96, 0xF3));
      it.rectangle(180, 260, 50, 40, Color::WHITE);
      it.printf(205, 280, id(font_medium), TextAlign::CENTER, Color::WHITE, "OK");
      
      // Bottom row
      it.rectangle(10, 310, 70, 35, Color::WHITE);
      it.printf(45, 328, id(font_small), TextAlign::CENTER, Color::WHITE, "HOME");
      
      it.rectangle(85, 310, 70, 35, Color::WHITE);
      it.printf(120, 328, id(font_small), TextAlign::CENTER, Color::WHITE, "BACK");
      
      it.rectangle(160, 310, 70, 35, Color::WHITE);
      it.printf(195, 328, id(font_small), TextAlign::CENTER, Color::WHITE, "PLAY");

# XPT2046 Touchscreen
touchscreen:
  - platform: xpt2046
    spi_id: display_spi
    cs_pin: GPIO21
    irq_pin: GPIO27
    calibration:
      x_min: 200
      x_max: 3900
      y_min: 200
      y_max: 3900
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    on_touch:
      - lambda: |-
          int x = touch.x;
          int y = touch.y;
          
          // D-pad area (centered at 120, 130)
          // Up: y 70-125
          if (x >= 92 && x <= 148 && y >= 70 && y <= 125) {
            id(roku_up).press();
          }
          // Down: y 135-190
          else if (x >= 92 && x <= 148 && y >= 135 && y <= 190) {
            id(roku_down).press();
          }
          // Left: x 35-90
          else if (x >= 35 && x <= 90 && y >= 102 && y <= 157) {
            id(roku_left).press();
          }
          // Right: x 150-205
          else if (x >= 150 && x <= 205 && y >= 102 && y <= 157) {
            id(roku_right).press();
          }
          // Select (center)
          else if (x >= 100 && x <= 140 && y >= 110 && y <= 150) {
            id(roku_select).press();
          }
          // VOL+ (10, 210) to (60, 250) - always TV
          else if (x >= 10 && x <= 60 && y >= 210 && y <= 250) {
            id(tv_vol_up).press();
          }
          // VOL- (10, 260) to (60, 300) - always TV
          else if (x >= 10 && x <= 60 && y >= 260 && y <= 300) {
            id(tv_vol_down).press();
          }
          // Device toggle (70, 220) to (170, 255)
          else if (x >= 70 && x <= 170 && y >= 220 && y <= 255) {
            id(use_stick) = !id(use_stick);
            id(main_display).update();
          }
          // Power (180, 210) to (230, 250) - always TV
          else if (x >= 180 && x <= 230 && y >= 210 && y <= 250) {
            id(tv_power).press();
          }
          // OK button (180, 260) to (230, 300)
          else if (x >= 180 && x <= 230 && y >= 260 && y <= 300) {
            id(roku_select).press();
          }
          // Home (10, 310) to (80, 345)
          else if (x >= 10 && x <= 80 && y >= 310 && y <= 345) {
            id(roku_home).press();
          }
          // Back (85, 310) to (155, 345)
          else if (x >= 85 && x <= 155 && y >= 310 && y <= 345) {
            id(roku_back).press();
          }
          // Play (160, 310) to (230, 345)
          else if (x >= 160 && x <= 230 && y >= 310 && y <= 345) {
            id(roku_play).press();
          }

# Fonts
font:
  - id: font_small
    file: "gfonts://Roboto"
    size: 12
  - id: font_medium
    file: "gfonts://Roboto"
    size: 16
  - id: font_large
    file: "gfonts://Roboto"
    size: 24

# HTTP Request component
http_request:
  useragent: "ESPHome/RokuRemote"
  timeout: 5s

# Navigation buttons (to selected device)
button:
  - id: roku_up
    platform: template
    name: "Roku Up"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Up" : "http://${tv_ip}:8060/keypress/Up";
  
  - id: roku_down
    platform: template
    name: "Roku Down"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Down" : "http://${tv_ip}:8060/keypress/Down";
  
  - id: roku_left
    platform: template
    name: "Roku Left"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Left" : "http://${tv_ip}:8060/keypress/Left";
  
  - id: roku_right
    platform: template
    name: "Roku Right"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Right" : "http://${tv_ip}:8060/keypress/Right";
  
  - id: roku_select
    platform: template
    name: "Roku Select"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Select" : "http://${tv_ip}:8060/keypress/Select";
  
  - id: roku_home
    platform: template
    name: "Roku Home"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Home" : "http://${tv_ip}:8060/keypress/Home";
  
  - id: roku_back
    platform: template
    name: "Roku Back"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Back" : "http://${tv_ip}:8060/keypress/Back";
  
  - id: roku_play
    platform: template
    name: "Roku Play/Pause"
    on_press:
      - http_request.post:
          url: !lambda |-
            return id(use_stick) ? "http://${stick_ip}:8060/keypress/Play" : "http://${tv_ip}:8060/keypress/Play";

# TV-only buttons (always send to TV)
  - id: tv_power
    platform: template
    name: "TV Power"
    on_press:
      - http_request.post:
          url: "http://${tv_ip}:8060/keypress/Power"
  
  - id: tv_vol_up
    platform: template
    name: "TV Volume Up"
    on_press:
      - http_request.post:
          url: "http://${tv_ip}:8060/keypress/VolumeUp"
  
  - id: tv_vol_down
    platform: template
    name: "TV Volume Down"
    on_press:
      - http_request.post:
          url: "http://${tv_ip}:8060/keypress/VolumeDown"

# Status LED
status_led:
  pin:
    number: GPIO48
    inverted: true
