# ESPHome Roku Remote
# Hardware: ESP32-S3 N16R8 Development Board
# Display: 2.4" TFT LCD Shield with ST7789V driver (240x320) + XPT2046 touchscreen

substitutions:
  name: roku-remote
  friendly_name: "Roku Remote"
  roku_ip: "192.168.4.39"  # Living Room Roku Soundbar

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  flash_size: 16MB

# PSRAM for display buffer
psram:
  mode: octal
  speed: 80MHz

# WiFi - update with your credentials
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  # Static IP recommended for stability
  # manual_ip:
  #   static_ip: 192.168.4.XXX
  #   gateway: 192.168.4.1
  #   subnet: 255.255.252.0

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# SPI for display and touchscreen
spi:
  - id: display_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19

# ST7789V 2.4" Display (240x320)
display:
  - platform: st7789v
    id: main_display
    spi_id: display_spi
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin: GPIO22
    rotation: 0
    dimensions:
      width: 240
      height: 320
    color_depth: 16
    data_rate: 40MHz
    auto_clear_enabled: false
    
    lambda: |-
      // Remote UI layout
      it.filled_rectangle(0, 0, 240, 40, Color(0x1E, 0x90, 0xFF));  // Blue header
      it.printf(120, 20, id(font_medium), TextAlign::CENTER, Color::WHITE, "Roku Remote");
      
      // Navigation buttons
      int btn_size = 60;
      int btn_x = 90;
      int btn_y = 80;
      
      // Up button
      it.rectangle(btn_x, btn_y, btn_size, btn_size, Color::WHITE);
      it.printf(btn_x + 30, btn_y + 30, id(font_large), TextAlign::CENTER, Color::WHITE, "^");
      
      // Down button
      btn_y = 200;
      it.rectangle(btn_x, btn_y, btn_size, btn_size, Color::WHITE);
      it.printf(btn_x + 30, btn_y + 30, id(font_large), TextAlign::CENTER, Color::WHITE, "v");
      
      // Left button
      btn_x = 30;
      btn_y = 140;
      it.rectangle(btn_x, btn_y, btn_size, btn_size, Color::WHITE);
      it.printf(btn_x + 30, btn_y + 30, id(font_large), TextAlign::CENTER, Color::WHITE, "<");
      
      // Right button
      btn_x = 150;
      it.rectangle(btn_x, btn_y, btn_size, btn_size, Color::WHITE);
      it.printf(btn_x + 30, btn_y + 30, id(font_large), TextAlign::CENTER, Color::WHITE, ">");
      
      // Select button (center)
      btn_x = 90;
      btn_y = 140;
      it.rectangle(btn_x, btn_y, btn_size, btn_size, Color::WHITE);
      it.filled_circle(btn_x + 30, btn_y + 30, 15, Color::WHITE);
      
      // Bottom row buttons
      int bottom_y = 280;
      it.rectangle(10, bottom_y, 50, 30, Color::WHITE);
      it.printf(35, bottom_y + 15, id(font_small), TextAlign::CENTER, Color::WHITE, "HOME");
      
      it.rectangle(70, bottom_y, 50, 30, Color::WHITE);
      it.printf(95, bottom_y + 15, id(font_small), TextAlign::CENTER, Color::WHITE, "BACK");
      
      it.rectangle(130, bottom_y, 50, 30, Color::WHITE);
      it.printf(155, bottom_y + 15, id(font_small), TextAlign::CENTER, Color::WHITE, "PLAY");
      
      it.rectangle(190, bottom_y, 40, 30, Color::WHITE);
      it.printf(210, bottom_y + 15, id(font_small), TextAlign::CENTER, Color::WHITE, "PWR");

# XPT2046 Touchscreen
touchscreen:
  - platform: xpt2046
    spi_id: display_spi
    cs_pin: GPIO21
    irq_pin: GPIO27
    calibration:
      x_min: 200
      x_max: 3900
      y_min: 200
      y_max: 3900
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    on_touch:
      - lambda: |-
          int x = touch.x;
          int y = touch.y;
          
          // Up button (90, 80) to (150, 140)
          if (x >= 90 && x <= 150 && y >= 80 && y <= 140) {
            id(roku_up).press();
          }
          // Down button (90, 200) to (150, 260)
          else if (x >= 90 && x <= 150 && y >= 200 && y <= 260) {
            id(roku_down).press();
          }
          // Left button (30, 140) to (90, 200)
          else if (x >= 30 && x <= 90 && y >= 140 && y <= 200) {
            id(roku_left).press();
          }
          // Right button (150, 140) to (210, 200)
          else if (x >= 150 && x <= 210 && y >= 140 && y <= 200) {
            id(roku_right).press();
          }
          // Select button (90, 140) to (150, 200)
          else if (x >= 90 && x <= 150 && y >= 140 && y <= 200) {
            id(roku_select).press();
          }
          // Home button (10, 280) to (60, 310)
          else if (x >= 10 && x <= 60 && y >= 280 && y <= 310) {
            id(roku_home).press();
          }
          // Back button (70, 280) to (120, 310)
          else if (x >= 70 && x <= 120 && y >= 280 && y <= 310) {
            id(roku_back).press();
          }
          // Play button (130, 280) to (180, 310)
          else if (x >= 130 && x <= 180 && y >= 280 && y <= 310) {
            id(roku_play).press();
          }
          // Power button (190, 280) to (230, 310)
          else if (x >= 190 && x <= 230 && y >= 280 && y <= 310) {
            id(roku_power).press();
          }

# Fonts
font:
  - id: font_small
    file: "gfonts://Roboto"
    size: 12
  - id: font_medium
    file: "gfonts://Roboto"
    size: 16
  - id: font_large
    file: "gfonts://Roboto"
    size: 24

# HTTP Request component for Roku ECP API
http_request:
  useragent: "ESPHome/RokuRemote"
  timeout: 5s

# Roku button templates
button:
  - id: roku_home
    platform: template
    name: "Roku Home"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Home"
  
  - id: roku_back
    platform: template
    name: "Roku Back"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Back"
  
  - id: roku_up
    platform: template
    name: "Roku Up"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Up"
  
  - id: roku_down
    platform: template
    name: "Roku Down"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Down"
  
  - id: roku_left
    platform: template
    name: "Roku Left"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Left"
  
  - id: roku_right
    platform: template
    name: "Roku Right"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Right"
  
  - id: roku_select
    platform: template
    name: "Roku Select"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Select"
  
  - id: roku_play
    platform: template
    name: "Roku Play/Pause"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/Play"
  
  - id: roku_power
    platform: template
    name: "Roku Power"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/PowerOff"

  - id: roku_volume_up
    platform: template
    name: "Roku Volume Up"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/VolumeUp"
  
  - id: roku_volume_down
    platform: template
    name: "Roku Volume Down"
    on_press:
      - http_request.post:
          url: "http://${roku_ip}:8060/keypress/VolumeDown"

# Status LED (optional - built-in on most dev boards)
status_led:
  pin:
    number: GPIO48
    inverted: true

# Deep sleep on idle (optional - saves battery)
# deep_sleep:
#   id: deep_sleep_1
#   sleep_duration: 30s
#   wakeup_pin: GPIO0
